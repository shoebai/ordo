<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Ordo — Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a0a0f;--s:#13131f;--card:#1a1a2e;--el:#1f1f35;
  --gold:#c9a84c;--gold2:#e8c97a;--gold-dim:rgba(201,168,76,.1);
  --red:#ef4444;--red-dim:rgba(239,68,68,.1);
  --green:#10b981;--green-dim:rgba(16,185,129,.1);
  --yellow:#f59e0b;--yellow-dim:rgba(245,158,11,.1);
  --blue:#3b82f6;--blue-dim:rgba(59,130,246,.1);
  --t1:#f5f0e8;--t2:#9a9080;--t3:#5a5448;
  --border:rgba(201,168,76,.12);
}
body{background:var(--bg);color:var(--t1);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh;}

/* Nav */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:var(--s);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;}
.logo{font-family:'Instrument Serif',serif;font-size:18px;color:var(--gold2);}
.logo span{font-size:10px;font-family:'DM Sans',sans-serif;color:var(--t3);letter-spacing:2px;text-transform:uppercase;display:block;}
.admin-badge{background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,.2);font-size:10px;font-weight:700;padding:3px 9px;border-radius:99px;letter-spacing:.5px;}

/* Layout */
.layout{display:flex;min-height:calc(100vh - 57px);}
.sidebar{width:200px;background:var(--s);border-right:1px solid var(--border);padding:16px;flex-shrink:0;position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto;}
.main{flex:1;padding:24px;overflow:auto;}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:8px;cursor:pointer;color:var(--t2);font-size:13px;font-weight:500;margin-bottom:3px;transition:.15s;border:none;background:none;width:100%;text-align:left;}
.nav-item:hover{background:var(--el);color:var(--t1);}
.nav-item.active{background:var(--gold-dim);color:var(--gold2);}
.nav-item i{width:16px;text-align:center;}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px;}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;}
.stat-icon{font-size:22px;margin-bottom:10px;}
.stat-val{font-family:'Instrument Serif',serif;font-size:32px;color:var(--t1);line-height:1;}
.stat-lbl{font-size:11px;color:var(--t3);margin-top:5px;text-transform:uppercase;letter-spacing:.5px;}

/* Table */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;padding:10px 14px;border-bottom:1px solid var(--border);text-align:left;}
.tbl td{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.03);font-size:13px;vertical-align:middle;}
.tbl tr:hover td{background:rgba(255,255,255,.015);}
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700;}
.badge-green{background:var(--green-dim);color:var(--green);}
.badge-yellow{background:var(--yellow-dim);color:var(--yellow);}
.badge-red{background:var(--red-dim);color:var(--red);}
.badge-blue{background:var(--blue-dim);color:var(--blue);}
.badge-gold{background:var(--gold-dim);color:var(--gold2);}

/* Inputs */
.input{width:100%;padding:10px 12px;background:var(--el);border:1px solid rgba(255,255,255,.07);border-radius:8px;color:var(--t1);font-family:inherit;font-size:13px;outline:none;}
.input:focus{border-color:var(--gold);}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:7px;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;transition:.2s;}
.btn-gold{background:var(--gold);color:#0a0a0f;}
.btn-gold:hover{background:var(--gold2);}
.btn-danger{background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,.2);}
.btn-danger:hover{background:var(--red);color:#fff;}
.btn-ghost{background:transparent;color:var(--t2);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold2);}
.btn-sm{padding:5px 11px;font-size:12px;}

/* Search */
.search-wrap{position:relative;margin-bottom:18px;}
.search-wrap i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:13px;}
.search-wrap input{padding-left:34px;}

/* Section headers */
.sec-hdr{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.sec-hdr::after{content:'';flex:1;height:1px;background:var(--border);}

/* Login */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-box{width:100%;max-width:360px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;}
.login-title{font-family:'Instrument Serif',serif;font-size:26px;color:var(--t1);text-align:center;margin-bottom:6px;}
.login-sub{font-size:12px;color:var(--t3);text-align:center;margin-bottom:24px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:600;color:var(--t3);letter-spacing:.6px;text-transform:uppercase;margin-bottom:6px;}
.err{color:var(--red);font-size:12px;margin-top:8px;}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.main>*{animation:fadeIn .3s ease;}
</style>
</head>
<body>

<div id="app">
  <!-- Rendered by JS -->
</div>

<script>
// ══════════════════════════════════════════════
// FIREBASE CONFIGURATION
// ══════════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyDTzLb-bqmZiNB0G0W4WTRGseMM37GUcpI",
  authDomain:        "pos-ordo.firebaseapp.com",
  projectId:         "pos-ordo",
  storageBucket:     "pos-ordo.firebasestorage.app",
  messagingSenderId: "575923763514",
  appId:             "1:575923763514:web:f81283d99aafd2460f3803"
};

// ── Super admin email ──────────────────────────
const ADMIN_EMAIL = "yshoeb52@gmail.com";

// Initialize Firebase
if (!firebase.apps.length) {
  firebase.initializeApp(FIREBASE_CONFIG);
}
const auth = firebase.auth();
const db   = firebase.firestore();

// ── Global State ───────────────────────────────
let currentAdmin = null;
let tenants = [];
let activeTab = 'overview';
let searchQuery = '';

// ── Auth State Listener ────────────────────────
auth.onAuthStateChanged(user => {
  if (user && user.email === ADMIN_EMAIL) {
    currentAdmin = user;
    loadDashboard();
  } else if (user) {
    auth.signOut();
    renderLogin('Access denied — admin only.');
  } else {
    renderLogin();
  }
});

// ── Load all tenants ───────────────────────────
async function loadDashboard() {
  renderLoading();
  try {
    const snap = await db.collection('tenants').orderBy('createdAt', 'desc').get();
    tenants = snap.docs.map(doc => ({ uid: doc.id, ...doc.data() }));
    renderDashboard();
  } catch (err) {
    console.error("Error loading tenants:", err);
    renderLogin("Error loading data. Check your connection and try again.");
  }
}

// ── Render Functions ───────────────────────────

function renderLoading() {
  const app = document.getElementById('app');
  if (app) {
    app.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#9a9080;font-size:14px;gap:10px;">
        <i class="fa fa-spinner fa-spin"></i> Loading dashboard…
      </div>`;
  }
}

function renderLogin(err = '') {
  const app = document.getElementById('app');
  if (!app) return;
  app.innerHTML = `
    <div class="login-wrap">
      <div class="login-box">
        <div class="login-title">Ordo Admin</div>
        <div class="login-sub">Super admin access only</div>
        ${err ? `<div class="err" style="margin-bottom:14px;padding:8px 12px;background:var(--red-dim);border-radius:6px;">${err}</div>` : ''}
        <div class="field"><label>Email</label><input class="input" id="adm-email" type="email" placeholder="${ADMIN_EMAIL}"/></div>
        <div class="field"><label>Password</label><input class="input" id="adm-pass" type="password" onkeydown="if(event.key==='Enter')adminLogin()"/></div>
        <div id="adm-err" class="err"></div>
        <button class="btn btn-gold" style="width:100%;justify-content:center;margin-top:12px;" onclick="adminLogin()">Sign In →</button>
      </div>
    </div>`;
}

async function adminLogin() {
  const email = document.getElementById('adm-email')?.value;
  const pass  = document.getElementById('adm-pass')?.value;
  const errDiv = document.getElementById('adm-err');
  
  if (!email || !pass) {
    if (errDiv) errDiv.textContent = 'Fill in both fields.';
    return;
  }
  if (email !== ADMIN_EMAIL) {
    if (errDiv) errDiv.textContent = 'Access denied — admin only.';
    return;
  }
  try {
    await auth.signInWithEmailAndPassword(email, pass);
  } catch(e) {
    if (errDiv) errDiv.textContent = 'Invalid credentials.';
  }
}

function renderDashboard() {
  // Stats calculations
  const total       = tenants.length;
  const trials      = tenants.filter(t => t.status === 'trial').length;
  const active      = tenants.filter(t => t.status === 'active').length;
  const expired     = tenants.filter(t => t.status === 'expired').length;
  const mrr         = tenants.filter(t => t.status === 'active' && t.plan === 'monthly').length * 199 +
                      tenants.filter(t => t.status === 'active' && t.plan === 'annual').length * 149;
  const newThisMonth = tenants.filter(t => {
    if (!t.createdAt) return false;
    const d = new Date(t.createdAt);
    const n = new Date();
    return d.getMonth() === n.getMonth() && d.getFullYear() === n.getFullYear();
  }).length;

  const filtered = tenants.filter(t =>
    !searchQuery ||
    (t.restaurantName || '').toLowerCase().includes(searchQuery.toLowerCase()) ||
    (t.email || '').toLowerCase().includes(searchQuery.toLowerCase()) ||
    (t.plan || '').toLowerCase().includes(searchQuery.toLowerCase())
  );

  const app = document.getElementById('app');
  if (!app) return;
  
  app.innerHTML = `
    <div class="topbar">
      <div class="logo">Ordo <span>Admin Dashboard</span></div>
      <div style="display:flex;align-items:center;gap:12px;">
        <span class="admin-badge">ADMIN</span>
        <span style="font-size:12px;color:var(--t3)">${currentAdmin?.email || ''}</span>
        <button class="btn btn-ghost btn-sm" onclick="signOut()"><i class="fa fa-sign-out-alt"></i> Sign out</button>
      </div>
    </div>

    <div class="layout">
      <div class="sidebar">
        <button class="nav-item ${activeTab === 'overview' ? 'active' : ''}" onclick="setTab('overview')"><i class="fa fa-chart-pie"></i> Overview</button>
        <button class="nav-item ${activeTab === 'tenants' ? 'active' : ''}" onclick="setTab('tenants')"><i class="fa fa-building"></i> Restaurants</button>
        <button class="nav-item ${activeTab === 'revenue' ? 'active' : ''}" onclick="setTab('revenue')"><i class="fa fa-coins"></i> Revenue</button>
        <button class="nav-item ${activeTab === 'expiring' ? 'active' : ''}" onclick="setTab('expiring')"><i class="fa fa-clock"></i> Expiring Soon</button>
      </div>

      <div class="main" id="tab-content">
        ${activeTab === 'overview'  ? renderOverview(total, trials, active, expired, mrr, newThisMonth, tenants) : ''}
        ${activeTab === 'tenants'   ? renderTenants(filtered) : ''}
        ${activeTab === 'revenue'   ? renderRevenue(tenants) : ''}
        ${activeTab === 'expiring'  ? renderExpiring(tenants) : ''}
      </div>
    </div>`;
}

function renderOverview(total, trials, active, expired, mrr, newMonth, tenantsList) {
  const recentTenants = [...tenantsList].slice(0, 8);
  return `
    <div class="stat-grid">
      <div class="stat"><div class="stat-icon">🏪</div><div class="stat-val">${total}</div><div class="stat-lbl">Total Restaurants</div></div>
      <div class="stat"><div class="stat-icon">⏳</div><div class="stat-val">${trials}</div><div class="stat-lbl">In Trial</div></div>
      <div class="stat"><div class="stat-icon">✅</div><div class="stat-val">${active}</div><div class="stat-lbl">Active (Paid)</div></div>
      <div class="stat"><div class="stat-icon">💰</div><div class="stat-val">SAR ${mrr.toLocaleString()}</div><div class="stat-lbl">Est. MRR</div></div>
      <div class="stat"><div class="stat-icon">📅</div><div class="stat-val">${newMonth}</div><div class="stat-lbl">New This Month</div></div>
      <div class="stat"><div class="stat-icon">⚠️</div><div class="stat-val">${expired}</div><div class="stat-lbl">Expired</div></div>
    </div>
    <div class="sec-hdr">Recent Signups</div>
    <div class="card" style="padding:0;overflow-x:auto;">
      <table class="tbl">
        <thead><tr><th>Restaurant</th><th>Plan</th><th>Status</th><th>Joined</th><th></th></tr></thead>
        <tbody>
          ${recentTenants.map(t => tenantRow(t)).join('')}
          ${recentTenants.length === 0 ? '<tr><td colspan="5" style="text-align:center;padding:40px;">No tenants yet</td></tr>' : ''}
        </tbody>
      </table>
    </div>`;
}

function renderTenants(filtered) {
  return `
    <div class="search-wrap">
      <i class="fa fa-search"></i>
      <input class="input" placeholder="Search restaurants, email, plan…" value="${searchQuery}" oninput="searchTenants(this.value)"/>
    </div>
    <div class="sec-hdr">${filtered.length} restaurant${filtered.length !== 1 ? 's' : ''}</div>
    <div class="card" style="padding:0;overflow-x:auto;">
      <table class="tbl">
        <thead><tr><th>Restaurant</th><th>Owner</th><th>Plan</th><th>Status</th><th>Trial Ends</th><th>Actions</th></tr></thead>
        <tbody>
          ${filtered.map(t => tenantRow(t, true)).join('')}
          ${filtered.length === 0 ? '<tr><td colspan="6" style="text-align:center;padding:40px;">No restaurants found</td></tr>' : ''}
        </tbody>
      </table>
    </div>`;
}

function renderRevenue(tenantsList) {
  const paid = tenantsList.filter(t => t.status === 'active');
  const monthly  = paid.filter(t => t.plan === 'monthly').length;
  const annual   = paid.filter(t => t.plan === 'annual').length;
  const lifetime = paid.filter(t => t.plan === 'lifetime').length;
  const mrr = monthly * 199 + annual * 149;
  const arr = mrr * 12;
  return `
    <div class="stat-grid">
      <div class="stat"><div class="stat-icon">💰</div><div class="stat-val">SAR ${mrr.toLocaleString()}</div><div class="stat-lbl">Monthly Recurring Revenue</div></div>
      <div class="stat"><div class="stat-icon">📈</div><div class="stat-val">SAR ${arr.toLocaleString()}</div><div class="stat-lbl">Annual Run Rate</div></div>
      <div class="stat"><div class="stat-icon">🔄</div><div class="stat-val">${monthly}</div><div class="stat-lbl">Monthly Subscribers</div></div>
      <div class="stat"><div class="stat-icon">📅</div><div class="stat-val">${annual}</div><div class="stat-lbl">Annual Subscribers</div></div>
      <div class="stat"><div class="stat-icon">♾️</div><div class="stat-val">${lifetime}</div><div class="stat-lbl">Lifetime Licenses</div></div>
    </div>
    <div class="sec-hdr">Paid Accounts</div>
    <div class="card" style="padding:0;overflow-x:auto;">
      <table class="tbl">
        <thead><tr><th>Restaurant</th><th>Plan</th><th>Email</th><th>Actions</th></tr></thead>
        <tbody>
          ${paid.map(t => `
           <tr>
            <td><strong>${escapeHtml(t.restaurantName || '—')}</strong></td>
            <td><span class="badge badge-green">${t.plan}</span></td>
            <td style="color:var(--t3)">${escapeHtml(t.email || '—')}</td>
            <td><button class="btn btn-ghost btn-sm" onclick="openTenant('${t.uid}')">View</button></td>
           </tr>`).join('')}
          ${paid.length === 0 ? '<tr><td colspan="4" style="text-align:center;padding:40px;">No paid accounts yet</td></tr>' : ''}
        </tbody>
      </table>
    </div>`;
}

function renderExpiring(tenantsList) {
  const soon = tenantsList.filter(t => {
    if (t.status !== 'trial') return false;
    if (!t.trialEnd) return false;
    const days = Math.ceil((new Date(t.trialEnd) - new Date()) / 86400000);
    return days <= 3 && days >= 0;
  }).sort((a, b) => new Date(a.trialEnd) - new Date(b.trialEnd));

  if (soon.length === 0) {
    return '<div class="sec-hdr">0 trials expiring within 3 days</div><div class="card" style="text-align:center;color:var(--t3);padding:40px;">No trials expiring soon 🎉</div>';
  }
  
  return `
    <div class="sec-hdr">${soon.length} trial${soon.length !== 1 ? 's' : ''} expiring within 3 days</div>
    <div class="card" style="padding:0;overflow-x:auto;">
      <table class="tbl">
        <thead><tr><th>Restaurant</th><th>Email</th><th>Days Left</th><th>Actions</th></tr></thead>
        <tbody>
          ${soon.map(t => {
            const days = Math.ceil((new Date(t.trialEnd) - new Date()) / 86400000);
            return `<tr>
              <td><strong>${escapeHtml(t.restaurantName || '—')}</strong></td>
              <td style="color:var(--t3)">${escapeHtml(t.email || '—')}</td>
              <td><span class="badge ${days <= 1 ? 'badge-red' : 'badge-yellow'}">${days} day${days !== 1 ? 's' : ''}</span></td>
              <td style="display:flex;gap:6px;">
                <button class="btn btn-ghost btn-sm" onclick="extendTrial('${t.uid}')"><i class="fa fa-clock"></i> Extend 7d</button>
                <button class="btn btn-gold btn-sm" onclick="activateTenant('${t.uid}','monthly')"><i class="fa fa-check"></i> Activate</button>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
}

function tenantRow(t, full = false) {
  const statusBadge = {
    trial:     '<span class="badge badge-yellow">Trial</span>',
    active:    '<span class="badge badge-green">Active</span>',
    expired:   '<span class="badge badge-red">Expired</span>',
    cancelled: '<span class="badge" style="background:rgba(255,255,255,.05);color:var(--t3)">Cancelled</span>',
  }[t.status] || '<span class="badge">—</span>';

  const planBadge = {
    trial:    '<span class="badge badge-blue">Trial</span>',
    monthly:  '<span class="badge badge-gold">Monthly</span>',
    annual:   '<span class="badge badge-gold">Annual</span>',
    lifetime: '<span class="badge badge-gold">Lifetime</span>',
  }[t.plan] || '<span class="badge">—</span>';

  const trialEnd = t.trialEnd ? new Date(t.trialEnd).toLocaleDateString() : '—';
  const joined   = t.createdAt ? new Date(t.createdAt).toLocaleDateString() : '—';

  if (full) {
    return `
     <tr>
      <td><strong>${escapeHtml(t.restaurantName || '—')}</strong><br><span style="color:var(--t3);font-size:11px">${escapeHtml(t.email || '—')}</span></td>
      <td style="color:var(--t2)">${escapeHtml(t.ownerName || '—')}</td>
      <td>${planBadge}</td>
      <td>${statusBadge}</td>
      <td style="color:var(--t3);font-size:12px">${trialEnd}</td>
      <td style="display:flex;gap:5px;flex-wrap:wrap;">
        <button class="btn btn-ghost btn-sm" onclick="openTenant('${t.uid}')"><i class="fa fa-eye"></i> View</button>
        <button class="btn btn-gold btn-sm" onclick="activateTenant('${t.uid}','monthly')"><i class="fa fa-check"></i> Activate</button>
        <button class="btn btn-danger btn-sm" onclick="expireTenant('${t.uid}')"><i class="fa fa-ban"></i> Expire</button>
      </td>
     </tr>`;
  }

  return `
     <tr>
      <td><strong>${escapeHtml(t.restaurantName || '—')}</strong><br><span style="color:var(--t3);font-size:11px">${escapeHtml(t.email || '—')}</span></td>
      <td>${planBadge}</td>
      <td>${statusBadge}</td>
      <td style="color:var(--t3);font-size:12px">${joined}</td>
      <td><button class="btn btn-ghost btn-sm" onclick="openTenant('${t.uid}')">View</button></td>
     </tr>`;
}

// ── Helper Functions ───────────────────────────
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

function searchTenants(value) {
  searchQuery = value;
  renderDashboard();
}

function signOut() {
  auth.signOut().then(() => {
    currentAdmin = null;
    renderLogin();
  });
}

function setTab(tab) {
  activeTab = tab;
  renderDashboard();
}

async function activateTenant(uid, plan) {
  if (!confirm(`Activate this account on the ${plan} plan?`)) return;
  try {
    const paidUntil = new Date();
    paidUntil.setMonth(paidUntil.getMonth() + (plan === 'annual' ? 12 : 1));
    await db.collection('tenants').doc(uid).update({
      status: 'active',
      plan: plan,
      paidUntil: paidUntil.toISOString(),
      updatedAt: new Date().toISOString()
    });
    await loadDashboard();
    alert('✅ Account activated!');
  } catch (err) {
    console.error("Error activating tenant:", err);
    alert('Error activating account. Please try again.');
  }
}

async function expireTenant(uid) {
  if (!confirm('Mark this account as expired?')) return;
  try {
    await db.collection('tenants').doc(uid).update({ 
      status: 'expired',
      updatedAt: new Date().toISOString()
    });
    await loadDashboard();
    alert('Account marked as expired.');
  } catch (err) {
    console.error("Error expiring tenant:", err);
    alert('Error updating account. Please try again.');
  }
}

async function extendTrial(uid) {
  const t = tenants.find(x => x.uid === uid);
  if (!t) return;
  try {
    const newEnd = new Date(t.trialEnd || new Date());
    newEnd.setDate(newEnd.getDate() + 7);
    await db.collection('tenants').doc(uid).update({ 
      trialEnd: newEnd.toISOString(),
      updatedAt: new Date().toISOString()
    });
    await loadDashboard();
    alert('✅ Trial extended by 7 days!');
  } catch (err) {
    console.error("Error extending trial:", err);
    alert('Error extending trial. Please try again.');
  }
}

function openTenant(uid) {
  const t = tenants.find(x => x.uid === uid);
  if (!t) return;
  const days = t.trialEnd ? Math.ceil((new Date(t.trialEnd) - new Date()) / 86400000) : null;
  
  const modalHtml = `
    <div class="overlay" id="tenant-modal" onclick="if(event.target.id==='tenant-modal')closeTenantModal()">
      <div class="modal">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;">
          <div>
            <div style="font-size:18px;font-weight:700;color:var(--t1)">${escapeHtml(t.restaurantName || '—')}</div>
            <div style="font-size:12px;color:var(--t3);margin-top:3px">${escapeHtml(t.uid || '—')}</div>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="closeTenantModal()"><i class="fa fa-times"></i></button>
        </div>
        <table style="width:100%;font-size:13px;border-collapse:collapse;">
          ${modalRow('Owner', t.ownerName || '—')}
          ${modalRow('Email', t.email || '—')}
          ${modalRow('Plan', t.plan || '—')}
          ${modalRow('Status', t.status || '—')}
          ${modalRow('Trial End', t.trialEnd ? new Date(t.trialEnd).toLocaleString() : '—')}
          ${days !== null ? modalRow('Days Left', days > 0 ? `${days} days` : 'Expired') : ''}
          ${modalRow('Paid Until', t.paidUntil ? (t.paidUntil === 'lifetime' ? 'Lifetime' : new Date(t.paidUntil).toLocaleString()) : '—')}
          ${modalRow('Joined', t.createdAt ? new Date(t.createdAt).toLocaleString() : '—')}
        </table>
        <div style="display:flex;gap:8px;margin-top:20px;flex-wrap:wrap;">
          <button class="btn btn-gold" onclick="activateTenant('${t.uid}','monthly');closeTenantModal()"><i class="fa fa-check"></i> Activate Monthly</button>
          <button class="btn btn-gold" onclick="activateTenant('${t.uid}','annual');closeTenantModal()"><i class="fa fa-check"></i> Activate Annual</button>
          <button class="btn btn-ghost" onclick="extendTrial('${t.uid}');closeTenantModal()"><i class="fa fa-clock"></i> Extend Trial 7d</button>
          <button class="btn btn-danger" onclick="expireTenant('${t.uid}');closeTenantModal()"><i class="fa fa-ban"></i> Expire</button>
        </div>
      </div>
    </div>`;
  
  document.getElementById('app').insertAdjacentHTML('beforeend', modalHtml);
}

function modalRow(label, value) {
  return `<tr>
    <td style="padding:8px 0;color:var(--t3);width:120px;font-size:12px;text-transform:uppercase;letter-spacing:.5px">${label}</td>
    <td style="padding:8px 0;color:var(--t1);font-weight:500">${escapeHtml(value)}</td>
   </tr>`;
}

function closeTenantModal() {
  const modal = document.getElementById('tenant-modal');
  if (modal) modal.remove();
}
</script>
</body>
</html>
